<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .brand-primary { fill: #1a3558; }
      .brand-accent  { fill: #f97316; }
      .brand-white   { fill: #ffffff; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="200" height="200" rx="28" ry="28" class="brand-primary"/>

  <!-- Three comparison bars - larger, centered -->
  <!-- Bar 1 (left) -->
  <rect x="30" y="80" width="34" height="80" rx="6" class="brand-white" opacity="0.85"/>
  <!-- Bar 2 (center) - tallest, accent color -->
  <rect x="83" y="48" width="34" height="112" rx="6" class="brand-accent"/>
  <!-- Bar 3 (right) -->
  <rect x="136" y="100" width="34" height="60" rx="6" class="brand-white" opacity="0.85"/>

  <!-- Top pick dot above center bar -->
  <circle cx="100" cy="36" r="10" class="brand-accent"/>
  <circle cx="100" cy="36" r="5"  class="brand-white"/>

  <!-- "CSH" monogram at bottom -->
  <text x="100" y="190"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="16"
        font-weight="900"
        letter-spacing="3"
        text-anchor="middle"
        class="brand-white"
        opacity="0.5">CSH</text>
</svg>
